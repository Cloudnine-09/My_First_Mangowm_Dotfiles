"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

command_timeout = 2000

format = """
$os\
$username\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$package\
$docker_context\
$kubernetes\
$shell\
$container\
$jobs\
${custom.memory_usage}\
${custom.battery}\
${custom.keyboard_layout}\
$cmd_duration\
$status\
$line_break\
$character\
"""

palette = 'matugen'

[palettes.matugen]
color_ok = '{{colors.tertiary.default.hex}}'
color_danger = '{{colors.error.default.hex}}'
color_caution = '{{colors.tertiary_container.default.hex}}'
color_os = '{{colors.primary.default.hex}}'
color_username = '{{colors.primary.default.hex}}'
color_directory = '{{colors.secondary.default.hex}}'
color_git = '{{colors.tertiary.default.hex}}'
color_git_added = '{{colors.tertiary.default.hex}}'
color_git_deleted = '{{colors.error.default.hex}}'
color_env = '{{colors.primary_fixed.default.hex}}'
color_kubernetes = '{{colors.secondary_container.default.hex}}'
color_docker = '{{colors.primary_fixed_dim.default.hex}}'
color_shell = '{{colors.on_surface_variant.default.hex}}'
color_container = '{{colors.surface_container_highest.default.hex}}'
color_other = '{{colors.outline.default.hex}}'
color_time = '{{colors.on_surface.default.hex}}'
color_duration = '{{colors.on_surface_variant.default.hex}}'
color_vimcmd_ok = '{{colors.tertiary.default.hex}}'
color_vimcmd_replace = '{{colors.secondary.default.hex}}'
color_vimcmd_visual = '{{colors.tertiary_container.default.hex}}'

[os]
disabled = false
style = "fg:color_os"
format = '[$symbol]($style)'

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
CachyOS = "у°®® "
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

[username]
show_always = true
style_user = "fg:color_username"
style_root = "bold fg:color_danger"
format = '[ $user ]($style)'

[directory]
style = "fg:color_directory"
read_only_style = "fg:color_directory"
repo_root_style = "bold fg:color_directory"
format = "[ $path ]($style)"
read_only = " пҖЈ"
home_symbol = "~"
truncation_symbol = "вҖҰ/"
truncation_length = 0
truncate_to_repo = true
fish_style_pwd_dir_length = 0
use_logical_path = true

[git_branch]
symbol = "пҗҳ"
style = "fg:color_git"
format = '( [$symbol $branch]($style) )'
only_attached = true
ignore_branches = []
truncation_length = 25
truncation_symbol = "..."
always_show_remote = false
disabled = false

[git_commit]
style = "fg:color_git"
format = "( [($tag)(@$hash)]($style) )"
commit_hash_length = 7
only_detached = true
tag_symbol = "у°“ј "
tag_disabled = false
disabled = false

[git_status]
style = "fg:color_git"
format = '([$ahead_behind]($style) )([$all_status]($style) )'
stashed = "*${count}"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
up_to_date = ""
diverged = "вҮЎ${ahead_count}вҮЈ${behind_count}"
conflicted = "=${count}"
deleted = "Г—${count}"
renamed = "В»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
ignore_submodules = false
disabled = false

[git_metrics]
format = '([([+$added]($added_style))([-$deleted]($deleted_style))](fg:color_git) )'
added_style = "fg:color_git_added"
deleted_style = "fg:color_git_deleted"
only_nonzero_diffs = true
disabled = false

[git_state]
style = "fg:color_danger"
format = '([$state( $progress_current/$progress_total)]($style bold) )'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

[nodejs]
symbol = "оҙҚ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[c]
symbol = "оҳһ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[rust]
symbol = "уұҳ—"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[golang]
symbol = "у°ҹ“"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[php]
symbol = "оҳҲ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[java]
symbol = "оү–"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[kotlin]
symbol = "оҳҙ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[haskell]
symbol = "оҳҹ"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[python]
symbol = "оҳҶ"
style = "fg:color_env"
format = '( [$symbol( $version)( $virtualenv)]($style) )'
version_format = '${raw}'

[package]
disabled = false
symbol = "у°Ҹ—"
style = "fg:color_env"
format = '( [$symbol( $version)]($style) )'

[docker_context]
symbol = "пҢҲ"
style = "fg:color_docker"
format = '( [$symbol( $context)]($style) )'

[kubernetes]
symbol = "уұғҫ"
style = "fg:color_kubernetes"
format = '( [($symbol( $cluster))]($style) )'
disabled = false

[shell]
disabled = false
format = '[ оҜҠ $indicator ]($style)'
bash_indicator = "bash"
fish_indicator = "fish"
zsh_indicator = "zsh"
powershell_indicator = "powershell"
pwsh_indicator = "pwsh"
ion_indicator = "ion"
elvish_indicator = "elvish"
tcsh_indicator = "tcsh"
xonsh_indicator = "xonsh"
cmd_indicator = "cmd"
nu_indicator = "nu"
unknown_indicator = ""
style = "fg:color_shell"

[container]
style = "fg:color_container"
format = '( [$symbol $name]($style) )'

[jobs]
symbol = "у°’Ӣ"
style = "fg:color_other"
format = '( [$symbol( $number)]($style) )'
symbol_threshold = 1
number_threshold = 1

[custom.memory_usage]
command = "starship module memory_usage"
when = '[ "${STARSHIP_COCKPIT_MEMORY_USAGE_ENABLED:-false}" = "true" ]'
shell = "sh"
format = "( $output )"
disabled = false

[memory_usage]
threshold = 0
symbol = "у°“…"
style = "fg:color_other"
format = '( [$symbol( ${ram})]($style) )'
disabled = false

[custom.battery]
command = """
battery_info=$(starship module battery)
if [ -n "$battery_info" ]; then
    percent=$(echo "$battery_info" | grep -o '[0-9]*%' | sed 's/%//')
    if [ "$percent" -le "${STARSHIP_COCKPIT_BATTERY_THRESHOLD:-0}" ]; then
        echo "$battery_info" | sed 's/%%/%/'
    fi
fi
"""
when = '[ "${STARSHIP_COCKPIT_BATTERY_ENABLED:-false}" = "true" ]'
shell = "sh"
format = "( $output )"
disabled = false

[battery]
full_symbol = "у°Ғ№"
charging_symbol = "у°Ӯ„"
discharging_symbol = "у°Ӯғ"
unknown_symbol = "у°Ӯ‘"
empty_symbol = "у°ӮҺ"
format = '( [$symbol( $percentage)]($style) )'
disabled = false

[[battery.display]]
threshold = 10
style = "bold fg:color_danger"

[[battery.display]]
threshold = 20
style = "fg:color_caution"

[[battery.display]]
threshold = 100
style = "fg:color_other"

[time]
disabled = false
time_format = "%R"
style = "fg:color_time"
format = '( [у°”ӣ $time]($style) )'

[cmd_duration]
min_time = 2000
format = '( [уұ«‘ $duration]($style) )'
style = 'fg:color_duration'
show_milliseconds = false
disabled = false

[status]
disabled = false
format = '( [$symbol( $common_meaning)( $signal_name)]($style) )'
map_symbol = true
pipestatus = true
symbol = 'у°…ҷ'
success_symbol = ''
not_executable_symbol = 'у°Ӯӯ'
not_found_symbol = 'у°Қү'
sigint_symbol = 'у°җҠ'
signal_symbol = 'уұҗӢ'
style = 'bold fg:color_danger'
recognize_signal_code = true

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:color_ok)'
error_symbol = '[вқҜ](bold fg:color_danger)'
vimcmd_symbol = '[вқ®](bold fg:color_vimcmd_ok)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:color_vimcmd_replace)'
vimcmd_replace_symbol = '[вқ®](bold fg:color_vimcmd_replace)'
vimcmd_visual_symbol = '[вқ®](bold fg:color_vimcmd_visual)'

[custom.keyboard_layout]
command = """

# Set env variables if you want to use layout aliases (in uppercase)
#     export STARSHIP_COCKPIT_KEYBOARD_LAYOUT_ABC=ENG
#     export STARSHIP_COCKPIT_KEYBOARD_LAYOUT_UKRAINIAN=UKR
#
# Implementations:
#     macOS

if [ "$(uname -s)" = "Darwin" ]; then
        input_source=$(defaults read ~/Library/Preferences/com.apple.HIToolbox.plist AppleCurrentKeyboardLayoutInputSourceID)
        layout_id=$(echo "$input_source" | cut -d '.' -f4)
        layout=$(printenv "STARSHIP_COCKPIT_KEYBOARD_LAYOUT_$(echo "$layout_id" | tr '[:lower:]' '[:upper:]')")
        echo "$layout" || echo "$layout_id"
fi

"""
symbol = "у°ҢҢ"
style = "fg:color_other"
format = '( [$symbol $output]($style) )'
when = '[ "${STARSHIP_COCKPIT_KEYBOARD_LAYOUT_ENABLED:-false}" = "true" ]'
shell = "sh"
disabled = false
